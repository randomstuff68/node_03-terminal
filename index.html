            isDragging = true;

            const rect = popup.getBoundingClientRect();

            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
          });

          document.addEventListener("mousemove", (e) => {
            if (!isDragging) return;

            console.log("MOVING");

            popup.style.left = e.clientX - offsetX + "px";
            popup.style.top = e.clientY - offsetY + "px";
            if (popup.hasTrail) {
              spawnTrail(popup);
            }
          });

          document.addEventListener("mouseup", () => {
            isDragging = false;
          });

        function makeShake(element) {
          setInterval(() => {
            let x = (Math.random() - 0.5) * 10;

        function makeBounce(element) {
          let hasTrail = Math.random() < 0.3;
          let dx = (Math.random() * 8 + 4) * (Math.random() < 0.5 ? 1 : -1);
          let dy = (Math.random() * 8 + 4) * (Math.random() < 0.5 ? 1 : -1);

          function move() {
            let rect = element.getBoundingClientRect();

            let x = rect.left + dx;
            let y = rect.top + dy;

            if (x <= 0 || x + rect.width >= window.innerWidth) dx *= -1;
            if (y <= 0 || y + rect.height >= window.innerHeight) dy *= -1;

            element.style.left = x + "px";
            element.style.top = y + "px";

            if (hasTrail && Math.random() < 0.5) {
              spawnTrail(element); // 🔥 FIXED
            }

            requestAnimationFrame(move);
          }

          move();
        }

        function spawnTrail(original) {
          if (isStopping) return;
          const clone = original.cloneNode(true);
          const rect = original.getBoundingClientRect();
          clone.classList.add("trail-clone");

          clone.style.position = "fixed";
          clone.style.left = rect.left + "px";
          clone.style.top = rect.top + "px";

          clone.style.opacity = "0.8";
