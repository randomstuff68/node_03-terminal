        function createPopup(text, img, link) {

          popup.style.background = "black";
          popup.style.border = "2px solid red";

          popup.appendChild(content);
          document.body.appendChild(popup);

          makeDraggable(popup, header);
        }

        function makeDraggable(popup, header) {
          let offsetX = 0;
          let offsetY = 0;
          let isDragging = false;

          header.addEventListener("mousedown", (e) => {
            isDragging = true;

            const rect = popup.getBoundingClientRect();

            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
          });

          document.addEventListener("mousemove", (e) => {
            if (!isDragging) return;

            popup.style.left = e.clientX - offsetX + "px";
            popup.style.top = e.clientY - offsetY + "px";
          });

          document.addEventListener("mouseup", () => {
            isDragging = false;
          });

        function makeShake(element) {
          setInterval(() => {
            let x = (Math.random() - 0.5) * 10;
            let y = (Math.random() - 0.5) * 10;

            element.style.transform = `translate(${x}px, ${y}px)`;
          }, 50);
        }

        function makeBounce(element) {
          let dx = (Math.random() * 8 + 4) * (Math.random() < 0.5 ? 1 : -1);
          let dy = (Math.random() * 8 + 4) * (Math.random() < 0.5 ? 1 : -1);

          function move() {
            let rect = element.getBoundingClientRect();

            let x = rect.left + dx;
            let y = rect.top + dy;

            // bounce off edges
            if (x <= 0 || x + rect.width >= window.innerWidth) dx *= -1;
            if (y <= 0 || y + rect.height >= window.innerHeight) dy *= -1;

            element.style.left = x + "px";
            element.style.top = y + "px";

            requestAnimationFrame(move);
          }

          move();
        }

        function startPulse() {
          let interval = 1200; // 100 BPM

          // 🔥 INSTANT FIRST FLASH
          document.body.style.transition = "none";
          document.body.style.backgroundColor = "#400000";
          isMaroon = true;

          pulseInterval = setInterval(() => {
            if (isMaroon) {
              // fade to black
              document.body.style.transition = "background-color 0.4s ease-out";
              document.body.style.backgroundColor = "black";
            } else {
              // instant maroon
              document.body.style.transition = "none";
              document.body.style.backgroundColor = "#400000";
            }

            isMaroon = !isMaroon;
          }, interval / 2);
        }

        function stopPulse() {
